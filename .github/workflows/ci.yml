name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  format:
    name: format
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: clippy
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-features --locked

  release-build:
    name: release-build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build the release profile
        run: cargo build --release --locked
      - name: Verify the crate package
        run: cargo package --locked

  composite-action:
    name: composite-action
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: Build through the local action
        id: tak-bench
        uses: ./
      - name: Verify action outputs
        shell: bash
        env:
          TAK_BENCH_BIN: ${{ steps.tak-bench.outputs.binary-path }}
          TAK_BENCH_VERSION: ${{ steps.tak-bench.outputs.version }}
        run: |
          set -euo pipefail
          expected="$(cargo metadata --format-version 1 --no-deps --locked | jq -r '.packages[] | select(.name == "tak-bench") | .version')"
          test -x "$TAK_BENCH_BIN"
          test "$TAK_BENCH_VERSION" = "$expected"
          test "$(tak-bench --version | awk '{print $2}')" = "$expected"

  audit:
    name: audit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
